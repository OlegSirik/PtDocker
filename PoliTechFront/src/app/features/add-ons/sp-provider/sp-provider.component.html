<div class="page-container">
  <div class="page-header">
    <h1 class="page-title">{{ isNewRecord ? 'Новый провайдер' : 'Провайдер: ' + provider.name }}</h1>
    <div class="header-actions">
      <button mat-icon-button type="button" class="header-icon-button" aria-label="Назад" (click)="goBack()">
        <mat-icon>arrow_back</mat-icon>
      </button>
      <button mat-flat-button color="primary" type="button" class="save-button" (click)="save()" [disabled]="loading">
        <mat-icon>save</mat-icon>
        Сохранить
      </button>
    </div>
  </div>

  <div class="pt-box">
    <div class="pt-box-title-row">
      <h3 class="pt-box-title">Данные провайдера</h3>
    </div>
    <div *ngIf="loading" class="pt-loading">Загрузка...</div>
    <div class="pt-box-card" *ngIf="!loading">
      <mat-form-field class="form-field" appearance="outline">
        <mat-label>ID</mat-label>
        <input matInput [value]="provider.id || ''" readonly>
      </mat-form-field>
      <mat-form-field class="form-field" appearance="outline">
        <mat-label>Название</mat-label>
        <input matInput [(ngModel)]="provider.name" required>
      </mat-form-field>
      <mat-form-field class="form-field" appearance="outline">
        <mat-label>Статус</mat-label>
        <mat-select [(ngModel)]="provider.status">
          <mat-option value="ACTIVE">ACTIVE</mat-option>
          <mat-option value="SUSPENDED">SUSPENDED</mat-option>
        </mat-select>
      </mat-form-field>
      <mat-form-field class="form-field" appearance="outline">
        <mat-label>Интеграция с поставщиком услуг</mat-label>
        <mat-select [(ngModel)]="provider.executionMode">
          <mat-option value="LOCAL">Без интеграции</mat-option>
          <mat-option value="API">API</mat-option>
        </mat-select>
      </mat-form-field>
    </div>
  </div>
</div>
