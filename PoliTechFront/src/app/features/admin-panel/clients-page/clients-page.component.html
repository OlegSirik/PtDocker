<div class="page-container">
  <div class="page-header">
    <h1 class="page-title">Партнеры</h1>
  </div>

  <div class="pt-box">
    <div class="pt-box-title-row">
      <h3 class="pt-box-title">Список партнеров</h3>
      <div class="pt-box-title-buttons">
        <button mat-flat-button (click)="addClient()">
          Новый партнер
        </button>
      </div>
    </div>
    <div class="pt-box-table-box">

      <div *ngIf="loading" class="loading">Загрузка партнеров...</div>
      <table mat-table [dataSource]="clients" class="business-table clients-table" *ngIf="!loading">
        <ng-container matColumnDef="id">
          <th mat-header-cell *matHeaderCellDef class="col-id">ID</th>
          <td mat-cell *matCellDef="let client" class="col-id">{{ client.id }}</td>
        </ng-container>

        <ng-container matColumnDef="clientId">
          <th mat-header-cell *matHeaderCellDef class="col-client-id">Client ID</th>
          <td mat-cell *matCellDef="let client" class="col-client-id">{{ client.clientId }}</td>
        </ng-container>

        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef class="col-name">Название</th>
          <td mat-cell *matCellDef="let client" class="col-name">{{ client.name }}</td>
        </ng-container>

        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef class="col-status">Статус</th>
          <td mat-cell *matCellDef="let client" class="col-status">
            <span class="status-badge" [ngClass]="'status-' + (client.isDeleted ? 'suspended' : 'active')">
              {{ client.isDeleted ? 'SUSPENDED' : 'ACTIVE' }}
            </span>
          </td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef class="col-actions"></th>
          <td mat-cell *matCellDef="let client" class="col-actions">
            <div class="action-buttons">
              <button mat-icon-button class="action-button" (click)="editClient(client, $event)">
                <mat-icon>edit</mat-icon>
              </button>
            </div>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"
            (click)="editClient(row)"
            class="clickable-row"></tr>
      </table>
    </div>
  </div>
</div>
