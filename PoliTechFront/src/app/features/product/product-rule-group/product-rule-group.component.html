<div class="product-rule-group">
  <div class="product-rule-group-header">
    <h4 class="product-rule-group-title">{{ title }}</h4>
    <button mat-stroked-button type="button" (click)="onAdd()">Добавить</button>
  </div>

  @if (sortedRules.length > 0) {
    <div class="pt-box-table-box">
      <table mat-table [dataSource]="sortedRules" class="pt-table product-cel-rules-table">
        <ng-container matColumnDef="code">
          <th mat-header-cell *matHeaderCellDef>Код</th>
          <td mat-cell *matCellDef="let row">{{ row.code }}</td>
        </ng-container>

        <ng-container matColumnDef="priority">
          <th mat-header-cell *matHeaderCellDef>Приоритет</th>
          <td mat-cell *matCellDef="let row">{{ row.priority }}</td>
        </ng-container>

        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef>Название</th>
          <td mat-cell *matCellDef="let row">{{ row.name }}</td>
        </ng-container>

        <ng-container matColumnDef="llmText">
          <th mat-header-cell *matHeaderCellDef>Текст правила</th>
          <td mat-cell *matCellDef="let row" class="llm-text-cell" [title]="row.llmText || ''">
            {{ row.llmText || '—' }}
          </td>
        </ng-container>

        <ng-container matColumnDef="errorText">
          <th mat-header-cell *matHeaderCellDef>Текст ошибки</th>
          <td mat-cell *matCellDef="let row" class="error-text-cell" [title]="row.message || ''">
            {{ row.message || '—' }}
          </td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef class="col-actions"></th>
          <td mat-cell *matCellDef="let row" class="col-actions">
            <span class="action-buttons">
              <button mat-icon-button type="button" (click)="onEdit(row, $event)" matTooltip="Редактировать">
                <mat-icon>edit</mat-icon>
              </button>
              <button
                mat-icon-button
                type="button"
                color="warn"
                (click)="onDelete(row, $event)"
                matTooltip="Деактивировать"
              >
                <mat-icon>delete</mat-icon>
              </button>
            </span>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
      </table>
    </div>
  }
</div>
