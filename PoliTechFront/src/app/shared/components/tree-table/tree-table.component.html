<table 
  mat-table 
  [dataSource]="dataSource" 
  class="tree-table"
  [class.animated]="enableAnimation"
>
  <!-- Название: отступ уровня + иконка +/- + текст (одна колонка) -->
  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef class="col-name">Название</th>
    <td mat-cell *matCellDef="let row" class="col-name">
      <div class="tree-name-cell" [style.padding-left.px]="row.level * indentPerLevel">
        <span class="tree-name-toggle-slot">
          @if (row.expandable) {
            <button
              type="button"
              mat-icon-button
              class="toggle-btn"
              [class.expanded]="isExpanded(row)"
              (click)="toggle(row); $event.stopPropagation()"
              [attr.aria-label]="isExpanded(row) ? 'Свернуть' : 'Развернуть'"
            >
              <mat-icon>{{ isExpanded(row) ? 'remove' : 'add' }}</mat-icon>
            </button>
          } @else {
            <span class="toggle-placeholder"></span>
          }
        </span>
        <span class="tree-name-body">
          @if (nameCellTpl) {
            <ng-container
              *ngTemplateOutlet="nameCellTpl; context: { $implicit: row.data, row: row }"
            />
          } @else {
            <span class="name-cell-text">{{ row.data.varName }}</span>
          }
        </span>
      </div>
    </td>
  </ng-container>

  <ng-container matColumnDef="code">
    <th mat-header-cell *matHeaderCellDef class="col-code">Код</th>
    <td mat-cell *matCellDef="let row" class="col-code">{{ row.data.varCode }}</td>
  </ng-container>

  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef class="col-actions"></th>
    <td mat-cell *matCellDef="let row" class="col-actions" (click)="$event.stopPropagation()">
      <div class="tree-actions-cell">

        @if (!disableBuiltInSoftDelete && !row.data.isDeleted) {
          <button
            mat-icon-button
            type="button"
            class="tree-action-delete"
            color="warn"
            [disabled]="row.data.isSystem === true"
            [matTooltip]="row.data.isSystem === true ? 'Системная переменная — удаление недоступно' : 'Скрыть из дерева'"
            matTooltipPosition="above"
            (click)="onBuiltInDeleteClick(row.data, $event)"
            [attr.aria-label]="'Удалить: ' + row.data.varName"
          >
            <mat-icon>delete</mat-icon>
          </button>
        }
        @if (actionsCellTpl) {
          <ng-container
            *ngTemplateOutlet="actionsCellTpl; context: { $implicit: row.data, row: row }"
          />
        }
      </div>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr 
    mat-row 
    *matRowDef="let row; columns: displayedColumns; trackBy: trackById" 
    (click)="rowClick.emit(row.data)"
    class="clickable-row"
    [class.tree-row-deleted]="row.data.isDeleted === true"
    [class.tree-row-unsaved-new]="row.data.unsavedSchemaRow === 'new'"
    [class.tree-row-unsaved-modified]="row.data.unsavedSchemaRow === 'modified'"
  ></tr>
</table>
