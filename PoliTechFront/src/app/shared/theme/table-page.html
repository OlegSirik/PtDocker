<div class="page-container">
    <div class="page-header">
      <h1 class="page-title">Продукты</h1>
    </div>
  
    <div class="pt-box">
      <div class="pt-box-title-row">
        <h3 class="pt-box-title">Список продуктов</h3>
        <div class="pt-box-title-buttons">
          <button mat-stroked-button ">Из файла</button>
          <button mat-flat-button ">Добавить</button>
        </div>
      </div>
    </div>  
  
    <div class="pt-box-title-search">
        <mat-form-field class="search-field" appearance="outline">
          <mat-label>Поиск</mat-label>
          <input matInput [(ngModel)]="searchText" (ngModelChange)="onSearch($event)" placeholder="Поиск">
          <mat-icon matSuffix>search</mat-icon>
        </mat-form-field>
    </div>
  
    <div class="pt-box-table-box">
  
        <table mat-table [dataSource]="paginatedProducts" class="pt-table products-table">
 
        </table>
  
     
    </div>
</div>
